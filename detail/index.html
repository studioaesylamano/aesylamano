<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aesyl Amano</title>
<meta name="description" content="" />
<meta name="theme-color" content="#02040f" />
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;△&lt;/text&gt;&lt;/svg&gt;" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--abyss:#02040f;--aqua:#B8D4F1;--cyan:#4A90C9;--sky:#7BB3E8;--glow:#5ad1ff;--text:#B8D4F1;--dim:#5e7fa8;--line:rgba(122,179,232,.14)}
*{margin:0;padding:0;box-sizing:border-box}
img{-webkit-user-drag:none;-moz-user-drag:none;user-drag:none;-webkit-touch-callout:none}
html{scroll-behavior:smooth}
body{background:var(--abyss);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(120% 60% at 50% -10%,rgba(90,209,255,.16),transparent 55%),linear-gradient(180deg,#071633,#050b1f 30%,#02040f 75%)}
header.bar{position:sticky;top:0;z-index:50;background:rgba(2,4,15,.6);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-in{max-width:880px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:"Space Grotesk",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:3px;font-size:15px;text-decoration:none;color:var(--aqua)}
.bar-in a.back{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--dim);text-decoration:none}
.bar-in a.back:hover{color:var(--aqua)}
main{max-width:880px;margin:0 auto;padding:70px 28px 120px}
.edge{height:3px;width:100%;background:linear-gradient(90deg,#050816,#0A0E27,#1E3A6F,#4A90C9,#7BB3E8,#B8D4F1)}
.tag{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);display:block;margin-bottom:18px}
.hero-img{width:100%;height:auto;border-radius:5px;margin:0 0 36px;display:block}
.price{font-family:"JetBrains Mono",monospace;font-size:17px;color:var(--sky);margin:8px 0 30px}
article h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(36px,7vw,68px);line-height:1.02;letter-spacing:-.02em;color:#dCEaFb;margin-bottom:28px;text-shadow:0 0 24px rgba(90,209,255,.35)}
article h2{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:30px;color:#dCEaFb;margin:8px 0 18px}
article h3{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:20px;color:var(--aqua);margin:34px 0 12px}
article p{font-size:18px;color:var(--aqua);margin-bottom:20px}
article strong{color:#dCEaFb;font-weight:500}
article a{color:var(--glow)}
article ul,article ol{margin:0 0 22px 22px;color:var(--aqua)}
article li{margin-bottom:9px;font-size:17px}
.gallery{margin:36px 0}
.gallery img{border-radius:4px;cursor:zoom-in;transition:filter .25s,box-shadow .25s;display:block}
.gallery img:hover{filter:brightness(1.08);box-shadow:0 0 24px rgba(90,209,255,.3)}
.gallery.m2{column-count:2;column-gap:12px}
.gallery.m2 img{width:100%;height:auto;margin:0 0 12px;break-inside:avoid}
.gallery.m3{column-count:3;column-gap:10px}
.gallery.m3 img{width:100%;height:auto;margin:0 0 10px;break-inside:avoid}
.gallery.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
.gallery.g2 img{width:100%;height:auto}
.gallery.jr{display:flex;flex-wrap:wrap;gap:8px}
.gallery.jr img{height:240px;width:auto;object-fit:cover;max-width:100%}
.gallery.cr{position:relative;text-align:center}
.gallery.cr img{display:none;width:auto;max-width:100%;max-height:78vh;margin:0 auto}
.gallery.cr img.cur{display:inline-block}
@media(max-width:600px){.gallery.m2{column-count:1}.gallery.m3{column-count:2}.gallery.g2{grid-template-columns:1fr}.gallery.jr img{height:180px}}
.crctl{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px}
.crctl button{width:38px;height:38px;border-radius:50%;border:1px solid var(--cyan);background:transparent;color:var(--aqua);font-size:20px;cursor:pointer;line-height:1}
.crctl button:hover{background:var(--cyan);color:#02040f}
.cdots{display:flex;gap:6px}
.cdot{width:7px;height:7px;border-radius:50%;background:rgba(122,179,232,.3)}
.cdot.on{background:var(--glow)}
#lyt{display:none}
body.lyton #lyt{display:flex;position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:300;gap:4px;background:rgba(4,8,20,.95);border:1px solid var(--cyan);border-radius:999px;padding:6px 8px;align-items:center}
#lyt .ll{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--dim);text-transform:uppercase;padding:0 8px;letter-spacing:1px}
#lyt button{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--aqua);background:transparent;border:none;padding:7px 12px;border-radius:999px;cursor:pointer}
#lyt button:hover{color:#fff}
#lyt button.on{background:var(--cyan);color:#02040f}
#lb{position:fixed;inset:0;z-index:200;background:rgba(2,4,15,.93);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:30px;cursor:zoom-out}
#lb.on{display:flex}
#lb img{max-width:95vw;max-height:90vh;border-radius:4px;box-shadow:0 0 70px rgba(90,209,255,.25)}
#lb .x{position:absolute;top:18px;right:26px;font-family:"JetBrains Mono",monospace;color:var(--aqua);font-size:26px;cursor:pointer;line-height:1}
#lb .nav{position:absolute;top:50%;transform:translateY(-50%);font-size:40px;color:var(--aqua);cursor:pointer;padding:10px 18px;user-select:none;opacity:.65;transition:.2s}
#lb .nav:hover{opacity:1;color:var(--glow)}
#lb .prev{left:10px}#lb .next{right:10px}
@media(max-width:600px){#lb .nav{font-size:30px;padding:6px 10px}}
.cta{margin-top:50px;padding-top:34px;border-top:1px solid var(--line)}
.cta a{display:inline-block;padding:15px 32px;font-size:12px;letter-spacing:1.6px;text-transform:uppercase;text-decoration:none;font-family:"Space Grotesk",sans-serif;font-weight:600;background:var(--cyan);color:#02040f;border-radius:2px;box-shadow:0 0 30px rgba(74,144,201,.4);transition:.25s}
.cta a:hover{background:var(--sky);box-shadow:0 0 44px rgba(90,209,255,.6)}
.err{font-family:"JetBrains Mono",monospace;color:var(--dim);text-align:center;padding:80px 0}
</style>
</head>
<body>
<header class="bar">
  <div class="bar-in">
    <a href="/" class="logo">Aesyl Amano</a>
    <a href="/" class="back">← back to home</a>
  </div>
</header>
<main><article id="detail"><p class="err">Loading…</p></article></main>
<div class="edge"></div>

<div id="lb"><span class="x" aria-label="Close">✕</span><span class="nav prev" aria-label="Previous">‹</span><img alt="" /><span class="nav next" aria-label="Next">›</span></div>

<div id="lyt"><span class="ll">Layout</span><button data-l="m2">2-col</button><button data-l="m3">3-col</button><button data-l="g2">Grid</button><button data-l="jr">Rows</button><button data-l="cr">Carousel</button></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function(){
  const q=new URLSearchParams(location.search);
  const type=(q.get('type')||'').toLowerCase();
  const want=(q.get('slug')||'').toLowerCase();
  const el=document.getElementById('detail');
  const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const img=p=>p?(/^https?:|^\//.test(p)?p:'/'+p.replace(/^\/+/,'')):'';
  const slug=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  fetch('/content.json',{cache:'no-store'}).then(r=>r.ok?r.json():Promise.reject()).then(d=>{
    const list=type==='service'?((d.services||{}).items||[]):((d.work||{}).items||[]);
    const it=list.find(x=>slug(x.title)===want);
    if(!it){el.innerHTML='<p class="err">Not found. <a href="/" style="color:var(--glow)">Back to home</a></p>';return;}
    document.title=it.title+' — Aesyl Amano';
    let html='';
    html+='<span class="tag">'+esc(it.tag||it.marker||'')+'</span>';
    if(it.image){html+='<img class="hero-img" src="'+img(it.image)+'" alt="'+esc(it.title)+'" />';}
    if(type==='service'&&it.price){/* price shown after heading via detail; also show here */}
    // detail markdown (already contains its own H2 heading)
    html+=marked.parse(it.detail||('## '+(it.title||'')+'\n\n'+(it.desc||'')));
    if(type!=='service'&&Array.isArray(it.gallery)&&it.gallery.length){
      html+='<div class="gallery m2" id="gal">'+it.gallery.map(g=>'<img src="'+img(g)+'" alt="" />').join('')+'</div>';
    }
    html+='<div class="cta"><a href="/#contact">Start a project →</a></div>';
    el.innerHTML=html;
    if(window.initLayouts)window.initLayouts();
  }).catch(()=>{el.innerHTML='<p class="err">Could not load. <a href="/" style="color:var(--glow)">Back to home</a></p>';});
})();

/* ===== gallery lightbox ===== */
(function(){
  var lb=document.getElementById('lb'),lbimg=lb.querySelector('img');
  var imgs=[],cur=0;
  function refresh(){imgs=[].slice.call(document.querySelectorAll('.gallery img'));}
  function open(i){refresh();cur=i;lbimg.src=imgs[cur].src;lb.classList.add('on');document.body.style.overflow='hidden';}
  function close(){lb.classList.remove('on');lbimg.src='';document.body.style.overflow='';}
  function go(d){if(!imgs.length)return;cur=(cur+d+imgs.length)%imgs.length;lbimg.src=imgs[cur].src;}
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t&&t.closest&&t.closest('.gallery img')){refresh();open(imgs.indexOf(t.closest('.gallery img')));}
  });
  lb.addEventListener('click',function(e){
    if(e.target.classList.contains('x')){close();}
    else if(e.target.classList.contains('prev')){e.stopPropagation();go(-1);}
    else if(e.target.classList.contains('next')){e.stopPropagation();go(1);}
    else if(e.target===lb){close();}
  });
  lbimg.addEventListener('click',function(e){e.stopPropagation();});
  document.addEventListener('keydown',function(e){
    if(!lb.classList.contains('on'))return;
    if(e.key==='Escape')close();else if(e.key==='ArrowLeft')go(-1);else if(e.key==='ArrowRight')go(1);
  });
})();

/* ===== deter casual image saving (not foolproof) ===== */
(function(){
  document.addEventListener('contextmenu',function(e){if(e.target.tagName==='IMG'||e.target.closest('.hero-img'))e.preventDefault();});
  document.addEventListener('dragstart',function(e){if(e.target.tagName==='IMG')e.preventDefault();});
})();

/* ===== gallery layout switcher (hidden; Shift+L or #layouts to reveal) ===== */
(function(){
  function justify(g){
    var imgs=[].slice.call(g.querySelectorAll('img'));
    if(!imgs.length)return;
    if(!imgs.every(function(im){return im.complete&&im.naturalWidth;})){
      imgs.forEach(function(im){im.addEventListener('load',function(){justify(g);},{once:true});});return;
    }
    var gap=8,target=(window.innerWidth<=600?180:240),cw=g.clientWidth,row=[],s=0;
    function flush(last){if(!row.length)return;var gaps=gap*(row.length-1),h=last?target:(cw-gaps)/s;if(h>target*1.7)h=target;row.forEach(function(im){var ar=im.naturalWidth/im.naturalHeight;im.style.height=Math.round(h)+'px';im.style.width=Math.round(ar*h)+'px';});row=[];s=0;}
    imgs.forEach(function(im){var ar=im.naturalWidth/im.naturalHeight;s+=ar;row.push(im);if(s*target+gap*(row.length-1)>=cw)flush(false);});flush(true);
  }
  function carousel(g){
    var imgs=[].slice.call(g.querySelectorAll('img'));if(!imgs.length)return;var cur=0;
    imgs.forEach(function(im,i){im.classList.toggle('cur',i===0);});
    var ctl=document.createElement('div');ctl.className='crctl';
    ctl.innerHTML='<button class="cprev" aria-label="Previous">‹</button><span class="cdots"></span><button class="cnext" aria-label="Next">›</button>';
    g.parentNode.insertBefore(ctl,g.nextSibling);
    var dots=ctl.querySelector('.cdots');
    imgs.forEach(function(_,i){var d=document.createElement('span');d.className='cdot'+(i===0?' on':'');dots.appendChild(d);});
    function show(i){cur=(i+imgs.length)%imgs.length;imgs.forEach(function(im,k){im.classList.toggle('cur',k===cur);});[].slice.call(dots.children).forEach(function(d,k){d.classList.toggle('on',k===cur);});}
    ctl.querySelector('.cprev').addEventListener('click',function(){show(cur-1);});
    ctl.querySelector('.cnext').addEventListener('click',function(){show(cur+1);});
  }
  function apply(name){
    var g=document.getElementById('gal');if(!g)return;
    var ctl=g.parentNode.querySelector('.crctl');if(ctl)ctl.remove();
    [].slice.call(g.querySelectorAll('img')).forEach(function(im){im.style.width='';im.style.height='';im.classList.remove('cur');});
    g.className='gallery '+name;
    if(name==='jr')justify(g);
    if(name==='cr')carousel(g);
    var bs=document.querySelectorAll('#lyt button');for(var i=0;i<bs.length;i++)bs[i].classList.toggle('on',bs[i].getAttribute('data-l')===name);
    try{localStorage.setItem('galLayout',name);}catch(e){}
  }
  window.initLayouts=function(){
    if(!document.getElementById('gal'))return;
    var saved='m2';try{saved=localStorage.getItem('galLayout')||'m2';}catch(e){}
    apply(saved);
    var bs=document.querySelectorAll('#lyt button');
    for(var i=0;i<bs.length;i++){(function(b){b.addEventListener('click',function(){apply(b.getAttribute('data-l'));});})(bs[i]);}
    var t;window.addEventListener('resize',function(){var g=document.getElementById('gal');if(g&&g.classList.contains('jr')){clearTimeout(t);t=setTimeout(function(){justify(g);},120);}});
    if(location.hash==='#layouts')document.body.classList.add('lyton');
    document.addEventListener('keydown',function(e){if(e.shiftKey&&e.key.toLowerCase()==='l'){document.body.classList.toggle('lyton');}});
  };
})();
</script>
</body>
</html>
