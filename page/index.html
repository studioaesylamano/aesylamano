<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aesyl Amano</title>
<meta name="description" content="" />
<meta name="theme-color" content="#02040f" />
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;△&lt;/text&gt;&lt;/svg&gt;" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--abyss:#02040f;--aqua:#B8D4F1;--cyan:#4A90C9;--glow:#5ad1ff;--text:#B8D4F1;--dim:#5e7fa8;--line:rgba(122,179,232,.14)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--abyss);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(120% 60% at 50% -10%,rgba(90,209,255,.16),transparent 55%),linear-gradient(180deg,#071633,#050b1f 30%,#02040f 70%)}
header.bar{position:sticky;top:0;z-index:50;background:rgba(2,4,15,.6);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-in{max-width:820px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:"Space Grotesk",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:3px;font-size:15px;text-decoration:none;color:var(--aqua)}
.bar-in a.back{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--dim);text-decoration:none}
.bar-in a.back:hover{color:var(--aqua)}
main{max-width:820px;margin:0 auto;padding:80px 28px 120px}
.edge{height:3px;width:100%;background:linear-gradient(90deg,#050816,#0A0E27,#1E3A6F,#4A90C9,#7BB3E8,#B8D4F1)}
article h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:clamp(34px,6vw,60px);line-height:1.05;letter-spacing:-.02em;color:#dCEaFb;margin-bottom:34px;text-shadow:0 0 24px rgba(90,209,255,.35)}
article h2{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:28px;color:#dCEaFb;margin:42px 0 16px}
article h3{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:21px;color:var(--aqua);margin:32px 0 12px}
article p{font-size:18px;color:var(--aqua);margin-bottom:20px}
article a{color:var(--glow)}
article ul,article ol{margin:0 0 20px 22px;color:var(--aqua)}
article li{margin-bottom:8px}
article img{max-width:100%;border-radius:4px;margin:24px 0}
article blockquote{border-left:2px solid var(--cyan);padding-left:20px;color:var(--dim);font-style:italic;margin:24px 0}
article code{font-family:"JetBrains Mono",monospace;font-size:.9em;background:rgba(122,179,232,.1);padding:2px 6px;border-radius:3px}
.err{font-family:"JetBrains Mono",monospace;color:var(--dim);text-align:center;padding:80px 0}
</style>
</head>
<body>
<header class="bar">
  <div class="bar-in">
    <a href="/" class="logo">Aesyl Amano</a>
    <a href="/" class="back">← back to home</a>
  </div>
</header>
<main><article id="page"><p class="err">Loading…</p></article></main>
<div class="edge"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function(){
  const slug=(new URLSearchParams(location.search).get('p')||'').replace(/[^a-z0-9\-_]/gi,'');
  const el=document.getElementById('page');
  if(!slug){el.innerHTML='<p class="err">No page specified.</p>';return;}
  fetch('/pages/'+slug+'.md',{cache:'no-store'}).then(r=>r.ok?r.text():Promise.reject()).then(raw=>{
    let title='',desc='',body=raw;
    const m=raw.match(/^---\s*([\s\S]*?)\s*---\s*([\s\S]*)$/);
    if(m){
      body=m[2];
      m[1].split('\n').forEach(line=>{
        const i=line.indexOf(':');if(i<0)return;
        const k=line.slice(0,i).trim(),v=line.slice(i+1).trim().replace(/^["']|["']$/g,'');
        if(k==='title')title=v; if(k==='description')desc=v;
      });
    }
    if(title){document.title=title+' — Aesyl Amano';}
    if(desc){document.querySelector('meta[name=description]').setAttribute('content',desc);}
    const html=(title?'<h1>'+title.replace(/</g,'&lt;')+'</h1>':'')+marked.parse(body);
    el.innerHTML=html;
  }).catch(()=>{el.innerHTML='<p class="err">Page not found.</p>';});
})();
</script>
</body>
</html>
