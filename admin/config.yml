# ============================================================
#  Aesyl Amano — CMS configuration
#  Sign in at /admin using "Sign In with Token" (a GitHub
#  personal access token). No OAuth app or worker needed.
# ============================================================

backend:
  name: github
  repo: studioaesylamano/aesylamano
  branch: main

# Where uploaded photos are stored in the repo, and how the site references them
media_folder: "images"
public_folder: "/images"

# Friendlier editing experience
site_url: https://aesylamano.com
display_url: https://aesylamano.com
publish_mode: simple

collections:
  # ---------- The home page (all sections) ----------
  - name: site
    label: "Home page"
    delete: false
    files:
      - name: content
        label: "Home page content"
        file: "content.json"
        format: json
        fields:
          - { label: "Browser tab title (SEO)", name: seoTitle, widget: string }
          - { label: "Search description (SEO)", name: seoDescription, widget: text }

          - label: "Hero (top of page)"
            name: hero
            widget: object
            fields:
              - { label: "Small label above headline", name: marker, widget: string }
              - { label: "Big headline", name: headline, widget: string }
              - { label: "Intro paragraph", name: lede, widget: text }
              - { label: "Button 1 text", name: cta1, widget: string }
              - { label: "Button 2 text", name: cta2, widget: string }
              - { label: "Background photo", name: image, widget: image, required: false }

          - label: "Logos strip (scrolling)"
            name: logos
            widget: object
            fields:
              - { label: "Small heading (e.g. Trusted by)", name: heading, widget: string, required: false }
              - label: "Logos"
                name: items
                widget: list
                summary: "Logo"
                label_singular: "Logo"
                fields:
                  - { label: "Logo image", name: image, widget: image }

          - label: "Selected work"
            name: work
            widget: object
            fields:
              - { label: "Section heading", name: heading, widget: string }
              - label: "Projects"
                name: items
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: "Tag (small caps)", name: tag, widget: string }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Short description (shown on home tile)", name: desc, widget: text, required: false }
                  - { label: "Cover photo", name: image, widget: image, required: false }
                  - { label: "Full write-up (project detail page)", name: detail, widget: markdown, required: false }
                  - label: "Gallery photos (detail page)"
                    name: gallery
                    widget: list
                    required: false
                    field: { label: "Photo", name: image, widget: image }

          - label: "Video library (own section)"
            name: videos
            widget: object
            fields:
              - { label: "Section heading", name: heading, widget: string, required: false }
              - label: "Videos"
                name: items
                widget: list
                summary: "{{fields.title}}"
                label_singular: "Video"
                fields:
                  - { label: "Title (optional)", name: title, widget: string, required: false }
                  - { label: "YouTube or Vimeo link", name: url, widget: string }

          - label: "Services & pricing"
            name: services
            widget: object
            fields:
              - { label: "Section heading", name: heading, widget: string }
              - label: "Packages"
                name: items
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: "Small label", name: marker, widget: string }
                  - { label: "Package name", name: title, widget: string }
                  - { label: "Price", name: price, widget: string, required: false }
                  - { label: "Highlight this one?", name: feature, widget: boolean, default: false }
                  - label: "What's included"
                    name: features
                    widget: list
                    field: { label: "Item", name: item, widget: string }
                  - { label: "Full write-up (service detail page)", name: detail, widget: markdown, required: false }

          - label: "Contact"
            name: contact
            widget: object
            fields:
              - { label: "Heading", name: heading, widget: string }
              - { label: "Intro", name: lede, widget: text }
              - { label: "Email address", name: email, widget: string }

          - label: "Footer"
            name: footer
            widget: object
            fields:
              - { label: "Left text", name: left, widget: string }
              - { label: "Right text", name: right, widget: string }

          - label: "Social links (footer icons)"
            name: social
            widget: object
            fields:
              - { label: "Instagram URL", name: instagram, widget: string, required: false }
              - { label: "LinkedIn URL", name: linkedin, widget: string, required: false }
              - { label: "TikTok URL", name: tiktok, widget: string, required: false }
              - { label: "YouTube URL", name: youtube, widget: string, required: false }

  # ---------- Extra pages you create yourself ----------
  - name: pages
    label: "Extra pages"
    label_singular: "Page"
    folder: "pages"
    create: true
    delete: true
    slug: "{{slug}}"
    format: frontmatter
    summary: "{{title}}"
    fields:
      - { label: "Page title", name: title, widget: string }
      - { label: "Search description (SEO)", name: description, widget: text, required: false }
      - { label: "Body", name: body, widget: markdown }
